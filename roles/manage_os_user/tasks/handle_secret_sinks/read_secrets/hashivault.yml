---

  - set_fact:
      _tmp_prepare_subrole_args: >-
        {{ _tmp_secret_readcfg
           | smabot.base.manage_users_cfg_secret_rw_new_secret(
                method='hvault', template_vars={
                  'hostname_inventory': inventory_hostname,
                }
             )
        }}


  - set_fact:
      _tmp_getter_key_templated: >-
         {{ _tmp_prepare_subrole_args._subcfg_sid_templated }}
      _tmp_prepare_subrole_args: >-
         {{ _tmp_prepare_subrole_args._subcfg_read }}


    ## note: always read all potential existing vm secrets at
    ##   once, much more efficient than doing this once for each host
  - block:

      - set_fact:
          smabot_hashivault_readwrite_secrets_args: >-
            {{ ansible_play_batch
               | map('extract', hostvars, '_tmp_prepare_subrole_args')
               | ansible.builtin.combine(recursive=True)
            }}


      - ansible.builtin.include_role:
          name: smabot.hashivault.readwrite_secrets

    run_once: true
    delegate_to: >-
      {{ _iter_users.value.secret_handler
       | default((ansible_play_batch | first), True) }}


  - name: successfully read secret(s) from hashivault
    set_fact:
      _tmp_user_pw: >-
         {{ smabot_hashivault_read_secrets[
               _tmp_getter_key_templated
            ][
               _tmp_secret_readcfg.config.secret_keys.password
            ] | default('')
         }}
    when: _tmp_secret_type == 'pw'
    no_log: >-
      {{ smabot_base_manage_os_user_args_normed.hide_secrets }}


  - name: successfully read secret(s) from hashivault
    set_fact:

      _tmp_user_new_sshkey_pub: >-
         {{ smabot_hashivault_read_secrets[
               _tmp_getter_key_templated
            ][
               _tmp_secret_readcfg.config.secret_keys.public_key
            ] | default('')
         }}

      _tmp_user_new_sshkey_private: >-
         {{ smabot_hashivault_read_secrets[
               _tmp_getter_key_templated
            ][
               _tmp_secret_readcfg.config.secret_keys.private_key
            ] | default('')
         }}

    when: _tmp_secret_type == 'ssh'
    no_log: >-
      {{ smabot_base_manage_os_user_args_normed.hide_secrets }}

